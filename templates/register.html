{% extends "base.html" %}

{% block title %}Register - AI Study Buddy{% endblock %}

{% block body %}
<div style="max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <div style="text-align: center; margin-bottom: 20px;">
        <span style="font-size: 3em;">🚀</span>
        <h2 style="margin: 10px 0 0 0;">Create Account</h2>
        <p style="color: #7f8c8d; margin-top: 5px;">Join AI Study Buddy today</p>
    </div>

    {% if error %}
        <div style="background: #fde8e8; color: #e74c3c; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 15px;">
            <strong>⚠️ {{ error }}</strong>
        </div>
    {% endif %}

    <form method="POST">
        <label style="font-weight: bold; color: #2c3e50;">Username</label>
        <input type="text" name="username" placeholder="Choose a unique username" required>
        
        <label style="font-weight: bold; color: #2c3e50;">Email</label>
        <input type="text" name="email" placeholder="Enter your email address" required>
        
        <label style="font-weight: bold; color: #2c3e50;">Password</label>
        <input type="password" name="password" placeholder="Minimum 6 characters" required>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1em; margin-top: 10px;">Register</button>
    </form>

    <p style="text-align: center; margin-top: 25px; color: #7f8c8d;">
        Already have an account? <a href="/login" style="color: #3498db; text-decoration: none; font-weight: bold;">Sign in</a>
    </p>
</div>
{% endblock %}
