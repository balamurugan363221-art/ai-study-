{% extends "base.html" %}

{% block title %}Login - AI Study Buddy{% endblock %}

{% block body %}
<div style="max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <div style="text-align: center; margin-bottom: 20px;">
        <span style="font-size: 3em;">⚡</span>
        <h2 style="margin: 10px 0 0 0;">Welcome Back</h2>
        <p style="color: #7f8c8d; margin-top: 5px;">Sign in to continue your studies</p>
    </div>

    {% if error %}
        <div style="background: #fde8e8; color: #e74c3c; padding: 10px; border-radius: 5px; text-align: center; margin-bottom: 15px;">
            <strong>⚠️ {{ error }}</strong>
        </div>
    {% endif %}

    <form method="POST">
        <label style="font-weight: bold; color: #2c3e50;">Username</label>
        <input type="text" name="username" placeholder="Enter your username" required>
        
        <label style="font-weight: bold; color: #2c3e50;">Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1em; margin-top: 10px;">Sign In</button>
    </form>

    <p style="text-align: center; margin-top: 25px; color: #7f8c8d;">
        Don't have an account? <a href="/register" style="color: #3498db; text-decoration: none; font-weight: bold;">Register here</a>
    </p>
</div>
{% endblock %}
