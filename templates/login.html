{% extends "base.html" %}
{% block title %}Login – AI Study Buddy{% endblock %}

{% block body %}
<div class="auth-page">
  <div class="auth-glow"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Study<strong>Buddy</strong></span>
    </div>
    <h1 class="auth-heading">Welcome back</h1>
    <p class="auth-sub">Sign in to continue your learning journey</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" class="auth-form">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="your_username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="/register">Register here</a></p>
  </div>
</div>
{% endblock %}
